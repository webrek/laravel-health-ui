name: Bug report
description: Report a problem with the package
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Your health-ui checks configuration and the check that misbehaves.
      render: php
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
    validations:
      required: true
